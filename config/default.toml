[server]
grpc_addr = "0.0.0.0:50051"
rest_addr = "0.0.0.0:8080"
store_path = "./data"
max_payload_bytes = 104857600

[server.tls]
enabled = false
cert_path = ""
key_path = ""

[server.auth]
enabled = false
token = ""
skip_ping = true

[index]
vector_dim = 1536
hnsw_ef_construction = 200
hnsw_m = 16
bm25_k1 = 1.5
bm25_b = 0.75

[ingest]
chunk_size_tokens = 512
chunk_overlap_tokens = 64
default_storage_mode = "text_only"
